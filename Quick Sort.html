<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速排序法動畫</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            text-align: center;
            background-color: #f8f9fa;
            color: #333;
        }
        h2 { margin-top: 30px; }
        .controls { margin: 20px; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 0 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #2980b9; }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #status {
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: bold;
            color: #2c3e50;
            height: 30px;
        }
        #array-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 350px;
            margin: 20px auto;
            gap: 8px;
        }
        .bar {
            width: 35px;
            background-color: #3498db; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 5px;
            font-weight: bold;
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease, background-color 0.3s ease;
        }
    </style>
</head>
<body>

    <h2>快速排序法 (Quick Sort)</h2>
    <div class="controls">
        <button onclick="generateArray()" id="genBtn">產生新陣列</button>
        <button onclick="startSort()" id="sortBtn">開始排序</button>
    </div>
    <div id="status">點擊「開始排序」觀察過程</div>
    <div id="array-container"></div>

    <script>
        let array = [];
        const container = document.getElementById("array-container");
        const statusText = document.getElementById("status");
        const delay = 600;

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function generateArray() {
            array = [];
            container.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                let val = Math.floor(Math.random() * 90) + 10;
                array.push(val);
                
                let bar = document.createElement("div");
                bar.classList.add("bar");
                bar.style.height = `${val * 3}px`;
                bar.innerText = val;
                container.appendChild(bar);
            }
            statusText.innerText = "新陣列已產生，準備就緒！";
            document.getElementById("sortBtn").disabled = false;
        }

        // 交換 DOM 元素樣式與數據
        async function swap(i, j) {
            let bars = document.getElementsByClassName("bar");
            
            // 數據交換
            let temp = array[i];
            array[i] = array[j];
            array[j] = temp;

            // DOM 交換 (高度與文字)
            bars[i].style.height = `${array[i] * 3}px`;
            bars[i].innerText = array[i];
            
            bars[j].style.height = `${array[j] * 3}px`;
            bars[j].innerText = array[j];
            
            await sleep(delay);
        }

        async function startSort() {
            document.getElementById("sortBtn").disabled = true;
            document.getElementById("genBtn").disabled = true;
            
            await quickSort(0, array.length - 1);
            
            // 排序完成，全體變綠色
            let bars = document.getElementsByClassName("bar");
            for(let i = 0; i < bars.length; i++) {
                bars[i].style.backgroundColor = "#2ecc71";
            }
            statusText.innerText = "排序完成！";
            document.getElementById("genBtn").disabled = false;
        }

        // 快速排序遞迴函數
        async function quickSort(left, right) {
            if (left >= right) {
                if (left === right) { // 只有一個元素時也標記為已定位
                    let bars = document.getElementsByClassName("bar");
                    bars[left].style.backgroundColor = "#e67e22";
                    await sleep(delay);
                    bars[left].style.backgroundColor = "#3498db";
                }
                return;
            }

            // 選擇最後一個元素為 Pivot
            let pivotIndex = await partition(left, right);
            
            // 遞迴排序 Pivot 左側和右側子陣列
            statusText.innerText = `Pivot ${array[pivotIndex]} 已在正確位置，對左側區間遞迴排序...`;
            await sleep(delay);
            await quickSort(left, pivotIndex - 1);
            
            statusText.innerText = `Pivot ${array[pivotIndex]} 已在正確位置，對右側區間遞迴排序...`;
            await sleep(delay);
            await quickSort(pivotIndex + 1, right);
        }

        // 分割函數
        async function partition(left, right) {
            let bars = document.getElementsByClassName("bar");
            let pivot = array[right];
            let pivotBar = bars[right];
            
            // 將 Pivot 標記為紫色
            pivotBar.style.backgroundColor = "#9b59b6";
            statusText.innerText = `選擇最後一個元素 ${pivot} 為基準點 (Pivot)`;
            await sleep(delay);

            let i = left - 1; // 小於 Pivot 的區域邊界

            // 掃描區間 [left 到 right-1]
            for (let j = left; j < right; j++) {
                // 將目前比較的元素標記為黃色
                bars[j].style.backgroundColor = "#f1c40f";
                statusText.innerText = `比較 ${array[j]} 與 Pivot ${pivot}`;
                await sleep(delay);

                if (array[j] < pivot) {
                    i++;
                    statusText.innerText = `${array[j]} 小於 Pivot ${pivot}，將其與前面位置交換`;
                    await swap(i, j);
                    // 交換後標記較小元素為藍色，較大元素（或原本交換前的 j 位置）為橘色以示區分
                    if(i !== j) {
                       bars[i].style.backgroundColor = "#3498db"; 
                       bars[j].style.backgroundColor = "#e67e22";
                    }
                } else {
                    statusText.innerText = `${array[j]} 大於 Pivot ${pivot}，留在後面`;
                    bars[j].style.backgroundColor = "#e67e22"; // 標橘色表示較大
                    await sleep(delay);
                }
            }

            // 最後將 Pivot 與 i+1 的位置交換，使 Pivot 放到正確位置
            statusText.innerText = `掃描完成，將 Pivot ${pivot} 放到其正確位置`;
            await swap(i + 1, right);
            
            // Pivot 位置已定位，標記為紅色表示目前遞迴層級已定位完成
            bars[i + 1].style.backgroundColor = "#e74c3c";
            
            // 將掃描區間的其他元素還原顏色 (除了 Pivot)
            for(let k = left; k <= right; k++) {
                if(k !== i + 1) {
                    bars[k].style.backgroundColor = "#3498db";
                }
            }
            await sleep(delay);
            
            return i + 1;
        }

        window.onload = generateArray;
    </script>
</body>
</html>
